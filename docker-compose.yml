services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_analyzer
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/cv_analyzer
      MAX_FILE_SIZE_MB: 1
    ports:
      - "8000:8000"
    volumes:
      - cv_uploads:/tmp/cv_uploads

volumes:
  postgres_data:
  cv_uploads:
