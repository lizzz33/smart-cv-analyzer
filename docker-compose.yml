services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_analyzer
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d cv_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    mem_limit: 256m
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    restart: unless-stopped
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/cv_analyzer
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAX_FILE_SIZE_MB: 1
    ports:
      - "8000:8000"
    volumes:
      - cv_uploads:/tmp/cv_uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: ./worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/cv_analyzer
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TEXT_MODEL_PATH: /models/Qwen2.5-3B
      VISION_MODEL_PATH: /models/Qwen2-VL-2B-Instruct
    volumes:
      - cv_uploads:/tmp/cv_uploads
      - ./models:/models:ro
    mem_limit: 9g
    restart: unless-stopped
    deploy:
      replicas: 1

  ui:
    build: ./ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    mem_limit: 256m
    restart: unless-stopped

volumes:
  postgres_data:
  cv_uploads:
